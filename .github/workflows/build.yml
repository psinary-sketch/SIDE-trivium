name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Mathlib
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Get Mathlib cache
        run: |
          lake exe cache get || true

      - name: Build
        run: lake build

  audit:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Count sorrys (excluding comments)
        id: sorry_count
        run: |
          # Count `sorry` only in code positions, not in -- or /- comments.
          # Heuristic: lines that contain `sorry` but are not pure comment lines.
          SORRY_COUNT=$(grep -rn "sorry" --include="*.lean" \
                        --exclude-dir=".lake" --exclude-dir="archive" . \
                        | grep -v "^\s*--" \
                        | grep -v "^\s*/-" \
                        | wc -l)
          echo "count=$SORRY_COUNT" >> $GITHUB_OUTPUT
          echo "Sorry count: $SORRY_COUNT"

      - name: List sorry locations
        run: |
          echo "=== Sorry locations ==="
          grep -rn "sorry" --include="*.lean" \
               --exclude-dir=".lake" --exclude-dir="archive" . \
               | grep -v "^\s*--" \
               | grep -v "^\s*/-" \
               || echo "(none)"

      - name: Count axioms (declarations beyond Lean core)
        id: axiom_count
        run: |
          AXIOM_COUNT=$(grep -rn "^axiom " --include="*.lean" \
                        --exclude-dir=".lake" --exclude-dir="archive" . \
                        | wc -l)
          echo "count=$AXIOM_COUNT" >> $GITHUB_OUTPUT
          echo "Axiom count: $AXIOM_COUNT"

      - name: List axiom locations
        run: |
          echo "=== Axiom locations ==="
          grep -rn "^axiom " --include="*.lean" \
               --exclude-dir=".lake" --exclude-dir="archive" . \
               || echo "(none)"

      - name: Generate audit.json
        run: |
          cat > audit.json << JSON
          {
            "repo": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "sha_short": "${GITHUB_SHA:0:7}",
            "run_id": "${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sorry_count": ${{ steps.sorry_count.outputs.count }},
            "axiom_count": ${{ steps.axiom_count.outputs.count }}
          }
          JSON
          cat audit.json

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.sha }}
          path: audit.json
          retention-days: 90
